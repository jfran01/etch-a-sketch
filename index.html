<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Etch-A-Sketch</title>
    <script src="mainScript.js" defer></script>
    <style>
      .square-container {
        display: flex;
        flex-direction: column;
        gap: 10px;
        width: 800px;
        height: 800px;
      }

      .row {
        display: flex;
        flex-direction: row;
        gap: 10px;
        flex: 1;
      }

      .square {
        color: lightgray;
        background-color: lightgray;
        flex: 1;
      }

      .hover {
        background-color: gray !important;
      }
    </style>
  </head>
  <body>
    <button id="new-grid-btn">New Grid</button>
    <div class="square-container"></div>
  </body>
</html>
